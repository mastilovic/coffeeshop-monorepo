apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app.kubernetes.io/name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/mastilovic/coffeeshop-backend:latest
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: docker
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                configMapKeyRef:
                  name: coffeeshop-config
                  key: SPRING_DATASOURCE_URL
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: coffeeshop-config
                  key: POSTGRES_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: coffeeshop-secrets
                  key: POSTGRES_PASSWORD
            - name: KEYCLOAK_BASE_URL
              value: http://keycloak:8080
            - name: KEYCLOAK_JWT_ISSUER_URI
              valueFrom:
                configMapKeyRef:
                  name: coffeeshop-config
                  key: KEYCLOAK_JWT_ISSUER_URI
            - name: KEYCLOAK_REALM
              valueFrom:
                configMapKeyRef:
                  name: coffeeshop-config
                  key: KEYCLOAK_REALM
            - name: KEYCLOAK_BACKEND_CLIENT_ID
              valueFrom:
                configMapKeyRef:
                  name: coffeeshop-config
                  key: KEYCLOAK_BACKEND_CLIENT_ID
            - name: KEYCLOAK_BACKEND_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: coffeeshop-secrets
                  key: KEYCLOAK_BACKEND_CLIENT_SECRET
            - name: KEYCLOAK_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: coffeeshop-secrets
                  key: KEYCLOAK_ADMIN
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: coffeeshop-secrets
                  key: KEYCLOAK_ADMIN_PASSWORD
            - name: CORS_ALLOWED_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: coffeeshop-config
                  key: CORS_ALLOWED_ORIGINS
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 20
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 1Gi
