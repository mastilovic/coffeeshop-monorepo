apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app.kubernetes.io/name: backend
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/mastilovic/coffeeshop-backend-go:latest
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: PORT
              value: "8080"
            - name: RUN_MIGRATIONS
              value: "true"
            - name: MIGRATIONS_PATH
              value: /app/migrations
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: coffeeshop-config
                  key: POSTGRES_USER
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: coffeeshop-config
                  key: POSTGRES_DB
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: coffeeshop-secrets
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/$(POSTGRES_DB)?sslmode=disable
            - name: KEYCLOAK_BASE_URL
              value: http://keycloak:8080
            - name: KEYCLOAK_REALM
              valueFrom:
                configMapKeyRef:
                  name: coffeeshop-config
                  key: KEYCLOAK_REALM
            - name: KEYCLOAK_BACKEND_CLIENT_ID
              valueFrom:
                configMapKeyRef:
                  name: coffeeshop-config
                  key: KEYCLOAK_BACKEND_CLIENT_ID
            - name: KEYCLOAK_JWT_ISSUER_URI
              valueFrom:
                configMapKeyRef:
                  name: coffeeshop-config
                  key: KEYCLOAK_JWT_ISSUER_URI
            - name: KEYCLOAK_BACKEND_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: coffeeshop-secrets
                  key: KEYCLOAK_BACKEND_CLIENT_SECRET
            - name: KEYCLOAK_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: coffeeshop-secrets
                  key: KEYCLOAK_ADMIN
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: coffeeshop-secrets
                  key: KEYCLOAK_ADMIN_PASSWORD
            - name: CORS_ALLOWED_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: coffeeshop-config
                  key: CORS_ALLOWED_ORIGINS
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 15
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 500m
