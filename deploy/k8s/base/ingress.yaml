apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: coffeeshop
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - APP_HOST_PLACEHOLDER
        - AUTH_HOST_PLACEHOLDER
      secretName: coffeeshop-tls
  rules:
    - host: APP_HOST_PLACEHOLDER
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
    - host: AUTH_HOST_PLACEHOLDER
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port:
                  number: 8080
