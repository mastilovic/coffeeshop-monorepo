name: CI/CD Staging

on:
  push:
    branches: [main]
    paths:
      - 'coffeeshop-go/**'
      - 'coffeeshop-frontend/**'
      - 'deploy/**'
      - '.github/workflows/**'

concurrency:
  group: ci-cd-staging
  cancel-in-progress: true

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}
    steps:
      - id: tag
        run: |
          short=$(echo "${GITHUB_SHA}" | cut -c1-7)
          echo "image_tag=sha-${short}" >> "$GITHUB_OUTPUT"

  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      deploy: ${{ steps.filter.outputs.deploy }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: filter
        run: |
          set -euo pipefail
          before="${{ github.event.before }}"
          after="${{ github.sha }}"

          if [ -z "$before" ] || [ "$before" = "0000000000000000000000000000000000000000" ]; then
            echo "backend=true" >> "$GITHUB_OUTPUT"
            echo "frontend=true" >> "$GITHUB_OUTPUT"
            echo "deploy=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git fetch --depth=1 origin "$before" 2>/dev/null || true
          changed=$(git diff --name-only "$before" "$after")

          backend=false
          frontend=false
          deploy=false

          while IFS= read -r file || [ -n "$file" ]; do
            [ -z "$file" ] && continue
            if echo "$file" | grep -qE '^(coffeeshop-go/|\.github/workflows/backend-ci\.yml|\.github/workflows/ci-cd-staging\.yml)'; then
              backend=true
            fi
            if echo "$file" | grep -qE '^(coffeeshop-frontend/|\.github/workflows/frontend-ci\.yml|\.github/workflows/ci-cd-staging\.yml)'; then
              frontend=true
            fi
            if echo "$file" | grep -qE '^(deploy/|\.github/workflows/deploy-staging\.yml|\.github/workflows/deploy-staging-reusable\.yml|\.github/workflows/ci-cd-staging\.yml)'; then
              deploy=true
            fi
          done <<< "$changed"

          echo "backend=$backend" >> "$GITHUB_OUTPUT"
          echo "frontend=$frontend" >> "$GITHUB_OUTPUT"
          echo "deploy=$deploy" >> "$GITHUB_OUTPUT"

  backend-test:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.deploy == 'true'
    defaults:
      run:
        working-directory: coffeeshop-go
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: coffeeshop-go/go.sum

      - name: Run tests
        run: go test ./... -race

      - name: Build
        run: go build -o server ./cmd/api

  frontend-test:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.deploy == 'true'
    defaults:
      run:
        working-directory: coffeeshop-frontend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: coffeeshop-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (docker configuration)
        run: npm run build:docker

  build-backend:
    runs-on: ubuntu-latest
    needs: [meta, changes, backend-test]
    if: always() && (needs.backend-test.result == 'success' || needs.backend-test.result == 'skipped')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/docker-build-push
        with:
          context: coffeeshop-go
          push: 'true'
          cache_scope: backend
          tags: |
            ghcr.io/mastilovic/coffeeshop-backend-go:${{ needs.meta.outputs.image_tag }}
            ghcr.io/mastilovic/coffeeshop-backend-go:latest

  build-frontend:
    runs-on: ubuntu-latest
    needs: [meta, changes, frontend-test]
    if: always() && (needs.frontend-test.result == 'success' || needs.frontend-test.result == 'skipped')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/docker-build-push
        with:
          context: coffeeshop-frontend
          push: 'true'
          cache_scope: frontend
          tags: |
            ghcr.io/mastilovic/coffeeshop-frontend:${{ needs.meta.outputs.image_tag }}
            ghcr.io/mastilovic/coffeeshop-frontend:latest

  deploy:
    needs: [meta, build-backend, build-frontend]
    if: >-
      needs.build-backend.result == 'success' &&
      needs.build-frontend.result == 'success'
    concurrency:
      group: deploy-staging
      cancel-in-progress: false
    uses: ./.github/workflows/deploy-staging-reusable.yml
    with:
      image_tag: ${{ needs.meta.outputs.image_tag }}
    secrets: inherit
