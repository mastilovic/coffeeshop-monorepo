name: CI/CD Staging

on:
  push:
    branches: [dev, main]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip unit tests (emergency deploy only)'
        type: boolean
        default: false

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}
    steps:
      - id: tag
        run: |
          short=$(echo "${GITHUB_SHA}" | cut -c1-7)
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "image_tag=sha-${short}" >> "$GITHUB_OUTPUT"
          else
            echo "image_tag=dev-sha-${short}" >> "$GITHUB_OUTPUT"
          fi

  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      deploy: ${{ steps.filter.outputs.deploy }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'coffeeshop/**'
              - '.github/workflows/backend-ci.yml'
              - '.github/workflows/ci-cd-staging.yml'
            frontend:
              - 'coffeeshop-frontend/**'
              - '.github/workflows/frontend-ci.yml'
              - '.github/workflows/ci-cd-staging.yml'
            deploy:
              - 'deploy/**'
              - '.github/workflows/deploy-staging.yml'
              - '.github/workflows/deploy-staging-reusable.yml'
              - '.github/workflows/ci-cd-staging.yml'

  backend-test:
    runs-on: ubuntu-latest
    needs: changes
    if: |
      (needs.changes.outputs.backend == 'true' || needs.changes.outputs.deploy == 'true') &&
      !(github.event_name == 'workflow_dispatch' && github.event.inputs.skip_tests == 'true')
    defaults:
      run:
        working-directory: coffeeshop
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - uses: gradle/actions/setup-gradle@v4

      - name: Build and test
        run: ./gradlew build --no-daemon

  frontend-test:
    runs-on: ubuntu-latest
    needs: changes
    if: |
      (needs.changes.outputs.frontend == 'true' || needs.changes.outputs.deploy == 'true') &&
      !(github.event_name == 'workflow_dispatch' && github.event.inputs.skip_tests == 'true')
    defaults:
      run:
        working-directory: coffeeshop-frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: coffeeshop-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (docker configuration)
        run: npm run build:docker

  build-backend:
    runs-on: ubuntu-latest
    needs: [meta, changes, backend-test]
    if: always() && (needs.backend-test.result == 'success' || needs.backend-test.result == 'skipped')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Prepare image tags
        id: prep
        run: |
          {
            echo "ghcr.io/mastilovic/coffeeshop-backend:${{ needs.meta.outputs.image_tag }}"
            if [ "${{ github.ref }}" = "refs/heads/main" ]; then
              echo "ghcr.io/mastilovic/coffeeshop-backend:latest"
            fi
          } > "${RUNNER_TEMP}/tags.txt"
          echo "tags<<EOF" >> "$GITHUB_OUTPUT"
          cat "${RUNNER_TEMP}/tags.txt" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: coffeeshop
          push: true
          tags: ${{ steps.prep.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    runs-on: ubuntu-latest
    needs: [meta, changes, frontend-test]
    if: always() && (needs.frontend-test.result == 'success' || needs.frontend-test.result == 'skipped')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Prepare image tags
        id: prep
        run: |
          {
            echo "ghcr.io/mastilovic/coffeeshop-frontend:${{ needs.meta.outputs.image_tag }}"
            if [ "${{ github.ref }}" = "refs/heads/main" ]; then
              echo "ghcr.io/mastilovic/coffeeshop-frontend:latest"
            fi
          } > "${RUNNER_TEMP}/tags.txt"
          echo "tags<<EOF" >> "$GITHUB_OUTPUT"
          cat "${RUNNER_TEMP}/tags.txt" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: coffeeshop-frontend
          push: true
          tags: ${{ steps.prep.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [meta, build-backend, build-frontend]
    if: |
      github.ref == 'refs/heads/main' &&
      needs.build-backend.result == 'success' &&
      needs.build-frontend.result == 'success'
    concurrency:
      group: deploy-staging
      cancel-in-progress: false
    uses: ./.github/workflows/deploy-staging-reusable.yml
    with:
      image_tag: ${{ needs.meta.outputs.image_tag }}
    secrets: inherit
