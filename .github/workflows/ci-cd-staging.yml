name: CI/CD Staging

on:
  push:
    branches: [main]
    paths:
      - 'coffeeshop/**'
      - 'coffeeshop-frontend/**'
      - 'deploy/**'
      - '.github/workflows/**'

concurrency:
  group: ci-cd-staging
  cancel-in-progress: true

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}
    steps:
      - id: tag
        run: |
          short=$(echo "${GITHUB_SHA}" | cut -c1-7)
          echo "image_tag=sha-${short}" >> "$GITHUB_OUTPUT"

  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      deploy: ${{ steps.filter.outputs.deploy }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'coffeeshop/**'
              - '.github/workflows/backend-ci.yml'
              - '.github/workflows/ci-cd-staging.yml'
            frontend:
              - 'coffeeshop-frontend/**'
              - '.github/workflows/frontend-ci.yml'
              - '.github/workflows/ci-cd-staging.yml'
            deploy:
              - 'deploy/**'
              - '.github/workflows/deploy-staging.yml'
              - '.github/workflows/deploy-staging-reusable.yml'
              - '.github/workflows/ci-cd-staging.yml'

  backend-test:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.deploy == 'true'
    defaults:
      run:
        working-directory: coffeeshop
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - uses: gradle/actions/setup-gradle@v4

      - name: Build and test
        run: ./gradlew build --no-daemon

  frontend-test:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.deploy == 'true'
    defaults:
      run:
        working-directory: coffeeshop-frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: coffeeshop-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (docker configuration)
        run: npm run build:docker

  build-backend:
    runs-on: ubuntu-latest
    needs: [meta, changes, backend-test]
    if: always() && (needs.backend-test.result == 'success' || needs.backend-test.result == 'skipped')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: coffeeshop
          push: true
          tags: |
            ghcr.io/mastilovic/coffeeshop-backend:${{ needs.meta.outputs.image_tag }}
            ghcr.io/mastilovic/coffeeshop-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    runs-on: ubuntu-latest
    needs: [meta, changes, frontend-test]
    if: always() && (needs.frontend-test.result == 'success' || needs.frontend-test.result == 'skipped')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: coffeeshop-frontend
          push: true
          tags: |
            ghcr.io/mastilovic/coffeeshop-frontend:${{ needs.meta.outputs.image_tag }}
            ghcr.io/mastilovic/coffeeshop-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [meta, build-backend, build-frontend]
    if: needs.build-backend.result == 'success' && needs.build-frontend.result == 'success'
    concurrency:
      group: deploy-staging
      cancel-in-progress: false
    uses: ./.github/workflows/deploy-staging-reusable.yml
    with:
      image_tag: ${{ needs.meta.outputs.image_tag }}
    secrets: inherit