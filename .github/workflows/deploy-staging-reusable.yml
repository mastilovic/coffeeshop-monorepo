# Requires GitHub Variables (STAGING_APP_HOST, STAGING_AUTH_HOST, STAGING_PUBLIC_SCHEME) and Secrets — see deploy/GITHUB_SETUP.md
name: Deploy Staging (reusable)

on:
  workflow_call:
    inputs:
      image_tag:
        description: 'GHCR image tag for backend and frontend (e.g. sha-abc1234)'
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Write staging config
        env:
          STAGING_APP_HOST: ${{ vars.STAGING_APP_HOST }}
          STAGING_AUTH_HOST: ${{ vars.STAGING_AUTH_HOST }}
          STAGING_PUBLIC_SCHEME: ${{ vars.STAGING_PUBLIC_SCHEME }}
        run: |
          set -euo pipefail
          SCHEME="${STAGING_PUBLIC_SCHEME:-http}"
          if [ "$SCHEME" != "http" ] && [ "$SCHEME" != "https" ]; then
            echo "::error::STAGING_PUBLIC_SCHEME must be http or https (got: ${SCHEME})"
            exit 1
          fi
          if [ -z "$STAGING_APP_HOST" ]; then
            echo "::error::Set repository variable STAGING_APP_HOST (e.g. app.kafenerija.online)"
            exit 1
          fi
          if [ -z "$STAGING_AUTH_HOST" ]; then
            echo "::error::Set repository variable STAGING_AUTH_HOST (e.g. auth.kafenerija.online)"
            exit 1
          fi
          {
            echo "APP_HOST=${STAGING_APP_HOST}"
            echo "AUTH_HOST=${STAGING_AUTH_HOST}"
            echo "POSTGRES_DB=coffeeshop"
            echo "POSTGRES_USER=coffeeshop"
            echo "KEYCLOAK_POSTGRES_DB=keycloak"
            echo "KEYCLOAK_POSTGRES_USER=keycloak"
            echo "KC_DB_URL=jdbc:postgresql://postgres-keycloak:5432/keycloak"
            echo "SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/coffeeshop"
            echo "KEYCLOAK_REALM=coffeeshop"
            echo "KEYCLOAK_BACKEND_CLIENT_ID=coffeeshop-backend"
            echo "KEYCLOAK_PUBLIC_URL=${SCHEME}://${STAGING_AUTH_HOST}"
            echo "KEYCLOAK_JWT_ISSUER_URI=${SCHEME}://${STAGING_AUTH_HOST}/realms/coffeeshop"
            echo "CORS_ALLOWED_ORIGINS=${SCHEME}://${STAGING_APP_HOST}"
          } > deploy/k8s/overlays/staging/config.env

      - name: Write staging secrets
        run: |
          {
            echo "POSTGRES_PASSWORD=${{ secrets.STAGING_POSTGRES_PASSWORD }}"
            echo "KEYCLOAK_POSTGRES_PASSWORD=${{ secrets.STAGING_KEYCLOAK_POSTGRES_PASSWORD }}"
            echo "KEYCLOAK_ADMIN=${{ secrets.STAGING_KEYCLOAK_ADMIN }}"
            echo "KEYCLOAK_ADMIN_PASSWORD=${{ secrets.STAGING_KEYCLOAK_ADMIN_PASSWORD }}"
            echo "KEYCLOAK_BACKEND_CLIENT_SECRET=${{ secrets.STAGING_KEYCLOAK_BACKEND_CLIENT_SECRET }}"
          } > deploy/k8s/overlays/staging/secrets.env

      - name: Render Keycloak realm from template
        env:
          STAGING_APP_HOST: ${{ vars.STAGING_APP_HOST }}
          STAGING_KEYCLOAK_BACKEND_CLIENT_SECRET: ${{ secrets.STAGING_KEYCLOAK_BACKEND_CLIENT_SECRET }}
        run: |
          if [ -z "$STAGING_APP_HOST" ]; then
            echo "::error::Set repository variable STAGING_APP_HOST"
            exit 1
          fi
          if [ -z "$STAGING_KEYCLOAK_BACKEND_CLIENT_SECRET" ]; then
            echo "::error::Set repository secret STAGING_KEYCLOAK_BACKEND_CLIENT_SECRET"
            exit 1
          fi
          envsubst '${STAGING_APP_HOST} ${STAGING_KEYCLOAK_BACKEND_CLIENT_SECRET}' \
            < deploy/k8s/overlays/staging/realm-coffeeshop.json.template \
            > deploy/k8s/overlays/staging/realm-coffeeshop.json

      - name: Install kubectl and kustomize
        run: |
          set -euo pipefail
          KUBECTL_VERSION="v1.32.0"
          KUSTOMIZE_VERSION="5.6.0"
          curl -fsSL "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl" -o kubectl
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/kubectl
          kubectl version --client
          curl -fsSL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv${KUSTOMIZE_VERSION}/kustomize_v${KUSTOMIZE_VERSION}_linux_amd64.tar.gz" | tar xz
          sudo mv kustomize /usr/local/bin/kustomize
          kustomize version

      - name: Configure kubeconfig
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        run: |
          mkdir -p "$HOME/.kube"
          if [ -z "$KUBE_CONFIG" ]; then
            echo "::error::KUBE_CONFIG secret is empty. Add a kubeconfig for your DOKS cluster (see deploy/README.md)."
            exit 1
          fi
          # Write via env var so multiline YAML is preserved (echo "${{ secrets.* }}" can break newlines).
          printf '%s' "$KUBE_CONFIG" > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Verify cluster connection
        run: |
          if ! grep -qE '^\s*server:\s*https://' "$HOME/.kube/config"; then
            echo "::error::kubeconfig has no https:// API server. Regenerate with: doctl kubernetes cluster kubeconfig save <cluster-name>"
            kubectl config view --minify 2>/dev/null || true
            exit 1
          fi
          echo "Context: $(kubectl config current-context)"
          echo "API server: $(kubectl config view --minify -o jsonpath='{.clusters[0].cluster.server}')"
          kubectl cluster-info

      - name: Set image tags
        working-directory: deploy/k8s/overlays/staging
        run: |
          kustomize edit set image \
            ghcr.io/mastilovic/coffeeshop-backend=ghcr.io/mastilovic/coffeeshop-backend:${{ inputs.image_tag }} \
            ghcr.io/mastilovic/coffeeshop-frontend=ghcr.io/mastilovic/coffeeshop-frontend:${{ inputs.image_tag }} \
            ghcr.io/mastilovic/coffeeshop-backend-go=ghcr.io/mastilovic/coffeeshop-backend-go:${{ inputs.image_tag }}

      - name: Deploy to cluster
        run: |
          kubectl apply -k deploy/k8s/overlays/staging
          kubectl rollout status deployment/backend -n coffeeshop-staging --timeout=300s
          kubectl rollout status deployment/backend-go -n coffeeshop-staging --timeout=300s
          kubectl rollout status deployment/frontend -n coffeeshop-staging --timeout=180s
          kubectl rollout status deployment/keycloak -n coffeeshop-staging --timeout=600s
