name: Frontend CI

on:
  pull_request:
    paths:
      - 'coffeeshop-frontend/**'
      - '.github/workflows/frontend-ci.yml'
      - '.github/workflows/ci-cd-staging.yml'

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: coffeeshop-frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: coffeeshop-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (docker configuration)
        run: npm run build:docker

  docker:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: coffeeshop-frontend
          push: false
          tags: ghcr.io/mastilovic/coffeeshop-frontend:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
