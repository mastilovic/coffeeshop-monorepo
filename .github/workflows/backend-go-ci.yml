name: Backend Go CI

on:
  pull_request:
    paths:
      - 'coffeeshop-go/**'
      - '.github/workflows/backend-go-ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: coffeeshop-go/go.sum
      - name: Run tests
        working-directory: coffeeshop-go
        run: go test ./... -v -race
      - name: Build
        working-directory: coffeeshop-go
        run: go build -o server ./cmd/api
