name: Backend Go CI

on:
  pull_request:
    paths:
      - 'coffeeshop-go/**'
      - '.github/workflows/backend-go-ci.yml'
  push:
    branches: [main]
    paths:
      - 'coffeeshop-go/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: coffeeshop-go/go.sum
      - name: Run tests
        working-directory: coffeeshop-go
        run: go test ./... -v -race
      - name: Build
        working-directory: coffeeshop-go
        run: go build -o server ./cmd/api

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: coffeeshop-go
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/coffeeshop-backend-go:${{ github.sha }},ghcr.io/${{ github.repository_owner }}/coffeeshop-backend-go:latest
