name: Deploy Staging (DOKS)

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag (e.g. sha-abc1234 from CI, or latest)'
        required: true
        default: latest
        type: string

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  deploy:
    uses: ./.github/workflows/deploy-staging-reusable.yml
    with:
      image_tag: ${{ inputs.image_tag }}
    secrets: inherit
