name: Backend CI

on:
  pull_request:
    paths:
      - 'coffeeshop/**'
      - '.github/workflows/backend-ci.yml'
      - '.github/workflows/ci-cd-staging.yml'

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: coffeeshop
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Build and test
        run: ./gradlew build --no-daemon

  docker:
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/docker-build-push
        with:
          context: coffeeshop
          push: 'false'
          cache_scope: backend-pr
          tags: ghcr.io/mastilovic/coffeeshop-backend:pr-${{ github.event.pull_request.number }}
