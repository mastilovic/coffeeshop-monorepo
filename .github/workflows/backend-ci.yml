name: Backend CI

on:
  pull_request:
    paths:
      - 'coffeeshop-go/**'
      - '.github/workflows/backend-ci.yml'
      - '.github/workflows/ci-cd-staging.yml'

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: coffeeshop-go
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: coffeeshop-go/go.sum

      - name: Run tests
        run: go test ./... -v -race

      - name: Build
        run: go build -o server ./cmd/api

  docker:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/docker-build-push
        with:
          context: coffeeshop-go
          push: 'false'
          cache_scope: backend-pr
          tags: ghcr.io/mastilovic/coffeeshop-backend-go:pr-${{ github.event.pull_request.number }}
