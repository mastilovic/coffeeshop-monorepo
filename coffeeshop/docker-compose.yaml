services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-coffeeshop}
      POSTGRES_USER: ${POSTGRES_USER:-coffeeshop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-coffeeshop_dev_password}
    ports:
      - "${POSTGRES_PORT:-25432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres-keycloak:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${KEYCLOAK_POSTGRES_DB:-keycloak}
      POSTGRES_USER: ${KEYCLOAK_POSTGRES_USER:-keycloak}
      POSTGRES_PASSWORD: ${KEYCLOAK_POSTGRES_PASSWORD:-keycloak_dev_password}
    ports:
      - "${KEYCLOAK_POSTGRES_PORT:-25433}:5432"
    volumes:
      - postgres_keycloak_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: ["start-dev", "--import-realm"]
    # entrypoint: ["/bin/bash", "/opt/keycloak/data/import/entrypoint-import.sh"]
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-keycloak:5432/${KEYCLOAK_POSTGRES_DB:-keycloak}
      KC_DB_USERNAME: ${KEYCLOAK_POSTGRES_USER:-keycloak}
      KC_DB_PASSWORD: ${KEYCLOAK_POSTGRES_PASSWORD:-keycloak_dev_password}
      # No KC_HOSTNAME*: fixed hostname "keycloak" breaks the admin UI in the host
      # browser (authServerUrl stays unreachable). start-dev infers URLs from the
      # request Host; backend token calls use http://keycloak:8080 → iss keycloak:8080.
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    volumes:
      - ./docker/keycloak/realm-coffeeshop.json:/opt/keycloak/data/import/realm-coffeeshop.json:ro
      - ./docker/keycloak/entrypoint.sh:/opt/keycloak/data/import/entrypoint-import.sh:ro
    depends_on:
      postgres-keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -ec 'exec 3<>/dev/tcp/127.0.0.1/8080; printf \"GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\n\\r\\n\" >&3; grep -q 200 <&3'"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 45s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-coffeeshop}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-coffeeshop}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-coffeeshop_dev_password}
      SPRING_DATA_REDIS_HOST: valkey
      SPRING_DATA_REDIS_PORT: 6379
      KEYCLOAK_BASE_URL: http://keycloak:8080
      KEYCLOAK_JWT_ISSUER_URI: http://keycloak:8080/realms/${KEYCLOAK_REALM:-coffeeshop}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-coffeeshop}
      KEYCLOAK_FRONTEND_CLIENT_ID: ${KEYCLOAK_FRONTEND_CLIENT_ID:-coffeeshop-spa}
      KEYCLOAK_BACKEND_CLIENT_ID: ${KEYCLOAK_BACKEND_CLIENT_ID:-coffeeshop-backend}
      KEYCLOAK_BACKEND_CLIENT_SECRET: ${KEYCLOAK_BACKEND_CLIENT_SECRET:-local-backend-secret}
      KEYCLOAK_ADMIN_USER: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:4200}
    ports:
      - "${BACKEND_PORT:-18080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health/readiness >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s

  frontend:
    build:
      context: ../coffeeshop-frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-4200}:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  postgres_keycloak_data:
  valkey_data:
