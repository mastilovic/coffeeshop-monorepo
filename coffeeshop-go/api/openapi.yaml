openapi: "3.0.3"
info:
  title: Coffeeshop Go API
  version: "2.0.0"
  description: Go-based backend for the Coffeeshop application.
servers:
  - url: http://localhost:18081
    description: Local development

paths:
  /api/v2/auth/login:
    post:
      summary: Authenticate user
      tags: [Auth]
      responses:
        "200":
          description: OK

  /api/v2/auth/register:
    post:
      summary: Register new user
      tags: [Auth]
      responses:
        "201":
          description: Created

  /api/v2/auth/refresh:
    post:
      summary: Refresh access token
      tags: [Auth]
      responses:
        "200":
          description: OK

  /api/v2/auth/logout:
    post:
      summary: Logout user
      tags: [Auth]
      responses:
        "204":
          description: No Content

  /api/v2/profile:
    get:
      summary: Get current user profile
      tags: [Profile]
      responses:
        "200":
          description: OK

  /api/v2/shop:
    get:
      summary: List shops
      tags: [Shop]
      responses:
        "200":
          description: OK
    post:
      summary: Create shop
      tags: [Shop]
      responses:
        "201":
          description: Created

  /api/v2/shop/{id}:
    get:
      summary: Get shop by ID
      tags: [Shop]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
    put:
      summary: Update shop
      tags: [Shop]
      parameters:
        - name: id
          in: path
